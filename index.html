<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relationship Constellation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="sidebar">
        <h1>Relationship Constellation</h1>
        <p class="intro">
          A personal map of people, relationships, and connections.
        </p>

        <div class="legend">
          <h2>Legend</h2>

          <div class="legend-item">
            <span class="legend-dot legend-partner"></span>
            <span>Partner</span>
          </div>

          <div class="legend-item">
            <span class="legend-dot legend-family"></span>
            <span>Family</span>
          </div>

          <div class="legend-item">
            <span class="legend-dot legend-friend"></span>
            <span>Friend</span>
          </div>

          <div class="legend-item">
            <span class="legend-dot legend-work"></span>
            <span>Work</span>
          </div>

          <div class="legend-item">
            <span class="legend-dot legend-community"></span>
            <span>Community</span>
          </div>

          <div class="legend-item">
            <span class="legend-dot legend-other"></span>
            <span>Other</span>
          </div>

          <div class="legend-line-item">
            <span class="legend-line"></span>
            <span>Direct connection to me</span>
          </div>

          <div class="legend-line-item">
            <span class="legend-line legend-line-person"></span>
            <span>Connection between people</span>
          </div>
        </div>

        <!-- Add person form -->
        <details class="form-toggle">
          <summary>Add person</summary>

          <form id="add-person-form" class="person-form">
            <label for="person-name">Name</label>
            <input id="person-name" name="name" type="text" required />

            <label for="person-category">Category</label>
            <select id="person-category" name="category" required>
              <option value="">Choose a category</option>
              <option value="partner">Partner</option>
              <option value="family">Family</option>
              <option value="friend">Friend</option>
              <option value="work">Work</option>
              <option value="community">Community</option>
              <option value="other">Other</option>
            </select>

            <label for="person-closeness">Closeness</label>
            <select id="person-closeness" name="closeness" required>
              <option value="1">1 - distant</option>
              <option value="2">2 - fairly distant</option>
              <option value="3">3 - medium</option>
              <option value="4">4 - close</option>
              <option value="5">5 - very close</option>
            </select>

            <label for="person-status">Status</label>
            <input
              id="person-status"
              name="status"
              type="text"
              placeholder="e.g. steady, distant, uncertain"
            />

            <label for="person-notes">Notes</label>
            <textarea
              id="person-notes"
              name="notes"
              rows="4"
              placeholder="A few notes about this relationship..."
            ></textarea>

            <button type="submit">Add person</button>
            <button
              id="cancel-edit-button"
              class="ghost-button"
              type="button"
              hidden
            >
              Cancel edit
            </button>
          </form>
        </details>

        <!-- Add connection form -->

        <details class="form-toggle">
          <summary>Add connection</summary>
          <form id="add-link-form" class="link-form">
            <label for="link-source">Person 1</label>
            <select id="link-source" name="sourceId" required>
              <option value="">Choose a person</option>
            </select>

            <label for="link-target">Person 2</label>
            <select id="link-target" name="targetId" required>
              <option value="">Choose a person</option>
            </select>

            <label for="link-type">Connection type</label>
            <input
              id="link-type"
              name="type"
              type="text"
              placeholder="e.g. friends, family, housemates"
            />

            <label for="link-strength">Connection strength</label>
            <select id="link-strength" name="strength" required>
              <option value="1">1 - loose / distant</option>
              <option value="2">2 - light connection</option>
              <option value="3" selected>3 - medium connection</option>
              <option value="4">4 - strong connection</option>
              <option value="5">5 - very strong connection</option>
            </select>

            <button type="submit">Add connection</button>
          </form>
        </details>

        <button id="reset-layout-button" class="secondary-button">
          Reset layout
        </button>

        <!-- Details panel -->
        <div id="details-panel" class="details-panel">
          <h2>Selected person</h2>
          <p>Click a person on the map to see details here.</p>
        </div>
      </section>

      <section class="map-panel">
        <svg
          id="constellation-map"
          viewBox="0 0 800 600"
          aria-label="Relationship constellation map"
        >
          <!-- The JavaScript will draw the constellation here -->
        </svg>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
